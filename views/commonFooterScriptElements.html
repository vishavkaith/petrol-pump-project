
    <script>
// Sidebar functionality
function openNav() {
    document.getElementById("mySidenav").style.width = "280px";
    document.getElementById("main").style.marginLeft = "280px";
    document.getElementById("main").style.width = "calc(100% - 280px)";
    document.body.classList.add("sidebar-open");
    document.body.classList.remove("sidebar-closed");
}

function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
    document.getElementById("main").style.marginLeft = "0";
    document.getElementById("main").style.width = "100%";
    document.body.classList.add("sidebar-closed");
    document.body.classList.remove("sidebar-open");
}

// Close sidebar when clicking outside on mobile
document.addEventListener('click', function(event) {
    const sidenav = document.getElementById("mySidenav");
    const hamburger = document.getElementById("hamburgerBtn");

    if (window.innerWidth <= 768) {
        if (!sidenav.contains(event.target) && !hamburger.contains(event.target) && sidenav.style.width === "280px") {
            closeNav();
        }
    }
});

// Handle window resize
window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
        openNav(); // Always open on desktop
    } else {
        closeNav(); // Close on mobile by default
    }
});

// Initialize sidebar state on page load
document.addEventListener('DOMContentLoaded', function() {
    if (window.innerWidth > 768) {
        openNav(); // Open on desktop
    } else {
        closeNav(); // Closed on mobile
    }
});
// Add footer dynamically
document.addEventListener('DOMContentLoaded', function () {
    const footer = document.createElement("footer");
    footer.className = "app-footer text-center py-2";
    footer.innerHTML = `
        Powered by 
        <a href="https://itsbegin.in" target="_blank" style="text-decoration:none;font-weight:600;">
            itsbegin.in
        </a>
    `;
    document.body.appendChild(footer);
});
</script>
<style>
    .app-footer {
    background: #f8f9fa;
    font-size: 13px;
    color: #666;
    border-top: 1px solid #e5e5e5;
}
</style>
